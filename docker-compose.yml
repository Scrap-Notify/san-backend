services:
  db:
    image: pgvector/pgvector:pg15
    container_name: san-db
    environment:
      - POSTGRES_DB=san
      - POSTGRES_USER=san
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U san"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: san-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/san
      - SPRING_DATASOURCE_USERNAME=san
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - AI_SERVER_URL=http://host.docker.internal:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
